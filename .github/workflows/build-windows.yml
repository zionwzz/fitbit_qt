name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app starts imports cleanly
        run: python -c "import main; print('main import ok')"

      - name: Initialize deploy spec if missing
        shell: pwsh
        run: |
          if (-Not (Test-Path "pysidedeploy.spec")) {
            pyside6-deploy main.py --init
          }

      - name: Build Windows package
        run: pyside6-deploy main.py

      - name: Show output tree
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Depth 3

      - name: Zip build output
        shell: pwsh
        run: |
          $candidates = @(
            "deployment",
            "dist",
            ".\deployment",
            ".\dist"
          ) | Where-Object { Test-Path $_ }

          if ($candidates.Count -eq 0) {
            throw "Could not find build output folder. Check the 'Show output tree' step to see where pyside6-deploy wrote files."
          }

          $outDir = $candidates[0]
          Compress-Archive -Path "$outDir\*" -DestinationPath "fitbit_qt-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitbit_qt-windows
          path: fitbit_qt-windows.zip
