name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        shell: pwsh
        run: |
          python -m venv .venv

      - name: Install dependencies in venv
        shell: pwsh
        run: |
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt

      - name: Verify imports
        shell: pwsh
        run: |
          .\.venv\Scripts\python -c "import main; print('main import ok')"

      - name: Initialize deploy spec if missing
        shell: pwsh
        run: |
          if (-Not (Test-Path "pysidedeploy.spec")) {
            .\.venv\Scripts\pyside6-deploy.exe main.py --init
          }

      - name: Build Windows package
        shell: pwsh
        run: |
          .\.venv\Scripts\pyside6-deploy.exe main.py

      - name: Show output tree
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Depth 4

      - name: Zip build output
        shell: pwsh
        run: |
          $app = Get-ChildItem -Recurse -Filter *.exe | Where-Object { $_.FullName -notmatch "\\.venv\\" } | Select-Object -First 1
          if (-not $app) {
            throw "No packaged .exe found."
          }

          $folder = Split-Path $app.FullName -Parent
          Compress-Archive -Path "$folder\*" -DestinationPath "fitbit_qt-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitbit_qt-windows
          path: fitbit_qt-windows.zip
