name: Build Windows app

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build in venv
        shell: pwsh
        run: |
          python -m venv .venv
          . .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          "Yes" | pyside6-deploy -f

      - name: Show all generated files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse . | Select-Object FullName

      - name: Find packaged exe and zip its folder
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter *.exe |
            Where-Object {
              $_.FullName -notmatch "\\.venv\\" -and
              $_.FullName -notmatch "\\Scripts\\" -and
              $_.Name -ne "python.exe"
            } |
            Select-Object -First 1

          if (-not $exe) {
            throw "No packaged .exe found anywhere in the workspace."
          }

          Write-Host "Found packaged exe at: $($exe.FullName)"
          $folder = Split-Path $exe.FullName -Parent
          Compress-Archive -Path "$folder\*" -DestinationPath "fitbit_qt-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitbit_qt-windows
          path: fitbit_qt-windows.zip
